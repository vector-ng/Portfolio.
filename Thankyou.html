<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent — Jimoh Ayomide</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0A0A0F;
      color: #F0EEE9;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      text-align: center;
      max-width: 480px;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #1a0a1a;
      border: 1px solid #bd14af;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }
    .icon svg {
      width: 28px;
      height: 28px;
      stroke: #bd14af;
      fill: none;
      stroke-width: 2;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }
    p {
      color: #8A8A9A;
      font-size: 1rem;
      line-height: 1.75;
      margin-bottom: 2.5rem;
      font-weight: 300;
    }
    a {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      background: #bd14af;
      color: #fff;
      padding: 0.75rem 1.75rem;
      border-radius: 6px;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>Message received.</h1>
    <p>Thanks for reaching out. I'll get back to you as soon as possible — usually within 24 hours.</p>
    <a href="https://jayomide.vercel.app">Back to Portfolio</a>
  </div>
</body>
</html>
